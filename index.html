<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Jogo Estilo RPG</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 4px solid #fff; }
    </style>
</head>
<body>

<canvas id="jogoCanvas"></canvas>

<script>
    const canvas = document.getElementById("jogoCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 800;
    canvas.height = 400;

    // Configurações do Personagem
    const player = {
        x: 50,
        y: 300,
        largura: 40,
        altura: 40,
        cor: "#00aaff",
        velocidade: 5,
        velY: 0,
        gravidade: 0.8,
        pulo: -15,
        noChao: false
    };

    const chaoY = 350;
    const teclas = {};

    // Detectar teclas
    window.addEventListener("keydown", e => teclas[e.code] = true);
    window.addEventListener("keyup", e => teclas[e.code] = false);

    function atualizar() {
        // Movimento Horizontal
        if (teclas["ArrowLeft"] && player.x > 0) player.x -= player.velocidade;
        if (teclas["ArrowRight"] && player.x < canvas.width - player.largura) player.x += player.velocidade;

        // Lógica de Pulo e Gravidade
        if (teclas["Space"] && player.noChao) {
            player.velY = player.pulo;
            player.noChao = false;
        }

        player.velY += player.gravidade;
        player.y += player.velY;

        // Colisão com o chão
        if (player.y + player.altura >= chaoY) {
            player.y = chaoY - player.altura;
            player.velY = 0;
            player.noChao = true;
        }

        desenhar();
        requestAnimationFrame(atualizar);
    }

    function desenhar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Desenhar Chão (Estilo OneShot/Undertale)
        ctx.fillStyle = "#333";
        ctx.fillRect(0, chaoY, canvas.width, canvas.height - chaoY);

        // Desenhar Personagem
        ctx.fillStyle = player.cor;
        ctx.fillRect(player.x, player.y, player.largura, player.altura);
        
        // Pequeno detalhe de "olhos" para parecer um personagem
        ctx.fillStyle = "white";
        ctx.fillRect(player.x + 25, player.y + 10, 8, 8);
    }

    atualizar();
</script>
</body>
</html>
